<!DOCTYPE html>
<!--
  =============================================================================
  MikoMart POS — Sistem Point of Sale
  =============================================================================
  Aplikasi web Point of Sale untuk supermarket MikoMart.
  Berjalan sepenuhnya di browser (offline-capable) menggunakan IndexedDB.
  
  Fitur Utama:
  - Transaksi POS dengan barcode scanning
  - Manajemen produk, kategori, dan pengguna (RBAC)
  - Kalkulasi PPN otomatis (11%)
  - Laporan penjualan (harian, bulanan, per kasir)
  - Cetak struk transaksi
  
  @version 1.0.0
  @date    28 Maret 2026
  @client  MikoMart (Supermarket)
  =============================================================================
-->
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistem Point of Sale (POS) MikoMart — Memproses transaksi penjualan supermarket dengan cepat, akurat, dan offline-capable.">
    <meta name="author" content="Tim Pengembang Sistem">
    <meta name="theme-color" content="#0F0E17">
    
    <title>MikoMart POS — Sistem Point of Sale</title>

    <!-- Google Fonts: Inter (UI) + JetBrains Mono (Monospace) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Favicon (inline SVG as data URI) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236C63FF' stroke-width='1.5'%3E%3Cpath d='M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z'/%3E%3Cline x1='3' y1='6' x2='21' y2='6'/%3E%3Cpath d='M16 10a4 4 0 01-8 0'/%3E%3C/svg%3E">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 
        Root container — konten dirender secara dinamis oleh App.js
        Halaman yang tersedia:
        - Login (default saat belum login)
        - POS Kasir (scan barcode, keranjang, bayar)
        - Admin: Manajemen Produk & Pengguna
        - Supervisor: Laporan Penjualan
    -->
    <div id="app">
        <!-- Loading state -->
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6C63FF" stroke-width="1.5" style="animation:spin 1.5s linear infinite">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            <p style="color:#A0A0B0;font-family:Inter,sans-serif;">Memuat MikoMart POS...</p>
        </div>
        <style>
            @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        </style>
    </div>

    <!--
        JavaScript Modules — dimuat dalam urutan dependensi:
        1. db.js       — Database (IndexedDB) — tidak bergantung modul lain
        2. auth.js     — Autentikasi — bergantung pada db.js
        3. pos.js      — Transaksi POS — bergantung pada db.js, auth.js
        4. products.js — Manajemen Produk — bergantung pada db.js
        5. users.js    — Manajemen Pengguna — bergantung pada db.js, auth.js
        6. reports.js  — Laporan — bergantung pada db.js
        7. receipt.js  — Struk — bergantung pada pos.js
        8. app.js      — Controller utama — bergantung pada semua modul di atas
    -->
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pos.js"></script>
    <script src="js/products.js"></script>
    <script src="js/users.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/receipt.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
